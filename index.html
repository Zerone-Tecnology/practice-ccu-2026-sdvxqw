<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Цифровое будущее 2026 — Хакатон</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">Nexcent Event</div>
            <nav>
                <ul>
                    <li><a href="#about">О событии</a></li>
                    <li><a href="#tracks">Направления</a></li>
                    <li><a href="#register">Регистрация</a></li>
                </ul>
            </nav>
            <a href="#register" class="btn">Принять участие</a>
        </div>
    </header>

    <main>
        <section id="about">
            <h1>Цифровое будущее 2026</h1>
            <p>Главный хакатон года для разработчиков.</p>
        </section>

        <section id="tracks">
            <h2>Направления</h2>
            <div class="grid">
                <div class="card"><h3>Программирование</h3></div>
                <div class="card"><h3>Сетевые технологии</h3></div>
                <div class="card"><h3>Искусственный интеллект</h3></div>
            </div>
        </section>

        <section id="register">
            <h2>Регистрация</h2>
            <form>
                <input type="text" placeholder="Имя" required>
                <input type="text" placeholder="Фамилия" required>
                <input type="email" placeholder="Email" required>
                <select><option>Программирование</option></select>
                <input type="url" placeholder="Ссылка на GitHub" required>
                <button type="submit">Отправить</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Nexcent Event</p>
    </footer>
</body>
</html>
